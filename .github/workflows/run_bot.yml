name: Run Telegram Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً في أي وقت

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start Bot
      env:
        TOKEN: ${{ secrets.TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 👈 السطر ده هو السحر اللي هيحل المشكلة
      run: python bot.py
